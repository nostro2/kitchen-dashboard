<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Household Chores Dashboard</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body data-theme="cozy">

<button id="header-toggle" title="Show/hide controls">▼</button>

<header class="hidden">
  <span class="header-title">🏠 Dashboard</span>

  <div class="controls">
    <select id="filter-room" title="Filter by room">
      <option value="">All rooms</option>
    </select>

    <select id="filter-assignee" title="Filter by assignee">
      <option value="">All assignees</option>
    </select>

    <select id="filter-urgency" title="Filter by urgency">
      <option value="">All urgency</option>
      <option value="hot">🔴 Hot</option>
      <option value="warm">🟡 Warm</option>
      <option value="cool">🔵 Cool</option>
    </select>
  </div>

  <div class="controls">
    <button class="theme-btn" data-theme="minimalist">Minimalist</button>
    <button class="theme-btn" data-theme="dark">Dark</button>
    <button class="theme-btn active" data-theme="cozy">Cozy</button>
  </div>
</header>

<main>
  <div id="cards">
    <p class="empty">Loading tasks…</p>
  </div>
</main>

<section id="weather">
  <div class="weather-panel">
    <div class="weather-header">
      <span class="weather-header-icon">🌤️</span>
      <span class="weather-header-name">Colchester</span>
      <span class="weather-last-updated" id="weather-updated"></span>
    </div>
    <div id="weather-body"><p class="weather-empty">Loading…</p></div>
  </div>
</section>

<section id="trains">
  <div class="train-panel" id="train-hyh">
    <div class="train-station-header">
      <span class="train-station-icon">🚆</span>
      <span class="train-station-name">Hythe (Essex)</span>
      <span class="train-last-updated" id="train-hyh-updated"></span>
    </div>
    <div class="train-board" id="train-hyh-board"><p class="train-empty">Loading…</p></div>
  </div>
  <div class="train-panel" id="train-cet">
    <div class="train-station-header">
      <span class="train-station-icon">🚆</span>
      <span class="train-station-name">Colchester Town</span>
      <span class="train-last-updated" id="train-cet-updated"></span>
    </div>
    <div class="train-board" id="train-cet-board"><p class="train-empty">Loading…</p></div>
  </div>
</section>

<script type="module" src="src/app.js"></script>
</body>
</html>
